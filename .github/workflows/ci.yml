name: CI Pipeline - Personal blog

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}

      - name: Build backend
        run: |
          cd blog-backend
          mvn clean install


  frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd blog-frontend
          npm install

      - name: Build Angular
        run: |
          cd blog-frontend
          npm run build -- --configuration production


  quality-backend:
    name: Analyse Spring Boot Code Quality
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SonarCloud Scan Backend
        run: |
          cd blog-backend
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=kerfaiyass54_personal-blog \
            -Dsonar.organization=kerfaiyass54 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  quality-frontend:
    name: Analyse Angular Code Quality
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: SonarCloud Scan Frontend
        run: |
          cd blog-frontend
          sonar-scanner \
            -Dsonar.projectKey=kerfaiyass54_personal-blog \
            -Dsonar.organization=kerfaiyass54 \
            -Dsonar.sources=src \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}