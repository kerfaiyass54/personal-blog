version: "3.9"

services:

  # ===============================
  # 🟢 MongoDB
  # ===============================
  mongodb:
    image: mongo:7
    container_name: blog-mongodb
    restart: always

    ports:
      - "27020:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - blog-network



  # ===============================
  # 🟢 Mongo Express UI
  # ===============================
  mongo-express:
    image: mongo-express
    container_name: blog-mongo-ui
    restart: always

    depends_on:
      - mongodb

    ports:
      - "8120:8081"

    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb

    networks:
      - blog-network



  # ===============================
  # 🟡 Zookeeper
  # ===============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: blog-zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "22181:2181"

    networks:
      - blog-network



  # ===============================
  # 🔵 Kafka
  # ===============================
  kafka:
    image: confluentinc/cp-kafka:7.3.0   # ✅ FIXED VERSION
    container_name: blog_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29093:29093"
    environment:

      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://blog_kafka:29093,PLAINTEXT_HOST://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    networks:
      - blog-network



  # ===============================
  # 🟣 Kafka UI
  # ===============================
  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: blog-kafka-ui

    depends_on:
      - kafka

    ports:
      - "8090:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: blog_kafka:29093

    networks:
      - blog-network



  # ===============================
  # 🔴 Elasticsearch
  # ===============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: blog-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

    ports:
      - "9205:9200"

    volumes:
      - es_data:/usr/share/elasticsearch/data

    networks:
      - blog-network



  # ===============================
  # 🟠 Kibana
  # ===============================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: blog-kibana

    depends_on:
      - elasticsearch

    ports:
      - "5605:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    networks:
      - blog-network



# ===============================
# 📦 VOLUMES
# ===============================
volumes:
  mongo_data:
  es_data:



# ===============================
# 🌐 NETWORK
# ===============================
networks:
  blog-network: